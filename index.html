<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中部運輸局 令和8年7月期 個人タクシー法令試験問題 令和8年7月1日実施</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <p class="eyebrow">令和8年7月1日実施</p>
      <h1>中部運輸局　令和8年7月期 個人タクシー法令試験問題</h1>
      <p class="lead">問1は〇×、問2は語群から選択して回答してください。全40問、正答率90％以上で合格圏内です。</p>
    </div>
  </header>

  <main class="container">
    
    <section class="pdf-download-menu" aria-label="PDFダウンロード">
      <a class="pdf-download-button" href="./問題演習用PDF.pdf" download="問題演習用PDF.pdf">問題演習用PDFダウンロード</a>
    </section>
    <section class="toolbar" aria-label="操作ボタン">
      <div class="progress-box" aria-live="polite">
        <span id="answeredCount">回答済み 0 / 40</span>
        <div class="progress-track" aria-hidden="true"><div id="progressBar" class="progress-bar"></div></div>
      </div>
      <div class="button-row">
        <button type="button" id="showAnswersButton" class="secondary-btn">正答を表示</button>
        <button type="button" id="resetButton" class="ghost-btn">やり直す</button>
      </div>
    </section>

    <section id="resultPanel" class="result-panel hidden" aria-live="polite"></section>

    <section class="panel" aria-labelledby="q1-title">
      <h2 id="q1-title">問1　〇×問題</h2>
      <p class="section-note">次の文章のうち正しいものには〇印を、誤っているものには×印を選択してください。</p>
      <div id="trueFalseQuestions" class="question-list"></div>
    </section>

    <section class="panel" aria-labelledby="q2-title">
      <h2 id="q2-title">問2　語群選択問題</h2>
      <p class="section-note">次の法令条文の（　　）にあてはまる言葉を下のア〜ソの中から選んでください。</p>
      <article id="fillQuestion" class="fill-question"></article>
      <div id="optionList" class="option-list" aria-label="語群"></div>
      <div id="blankSelectors" class="blank-selectors"></div>
    </section>

    <section class="grade-section" aria-label="採点">
      <button type="button" id="gradeButton" class="primary-btn grade-btn">採点する</button>
    </section>
  </main>

  <footer class="footer">
    <p>この練習アプリは、ブラウザ内だけで動作します。回答内容は端末内に一時保存され、外部へ送信されません。</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
